<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Market Intelligence Cockpit</title>

<style>

body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:#F4F6F8;
}

header{
    background:#0B2540;
    color:white;
    padding:30px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:40px;
}

header p{
    margin-top:10px;
    opacity:0.9;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.dashboard-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
}

.dashboard-card{
    background:#005195;
    color:white;
    text-decoration:none;
    padding:50px;
    border-radius:15px;
    text-align:center;
    font-size:32px;
    letter-spacing:0.5px

    font-weight:bold;
    transition:0.3s;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.dashboard-card:hover{
    transform:translateY(-5px);
    background:#0B2540;
}

@media(max-width:768px){
    .dashboard-grid{
        grid-template-columns:1fr;
    }
}

</style>

</head>

<body>

<header>
    <h1>Market Intelligence Cockpit</h1>
</header>

</html>
