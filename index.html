<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Market Intelligence Cockpit</title>

<style>

body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:#F4F6F8;
}

header{
    background:#0B2540;
    color:white;
    text-align:center;
    padding:30px;
}

h1{
    margin:0;
    font-size:42px;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:40px 20px;
}

.dashboard-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
}

.dashboard-card{
    background:#005195;
    color:white;
    text-decoration:none;
    border-radius:15px;
    padding:90px 40px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    transition:all 0.3s ease;
}

.dashboard-card:hover{
    background:#0B2540;
    transform:translateY(-5px);
}

@media(max-width:768px){
    .dashboard-grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<header>
    <h1>GRAMMER Market Intelligence Cockpit</h1>
</header>

<div class="container">
 
<div class="dashboard-grid">

    <a href="production.html" class="dashboard-card">
       🏭 Production & ⚡Propulsion
    </a>

    <a href="sales.html" class="dashboard-card">
       📈 Sales
    </a>

     <a href="news.html" class="dashboard-card">
        📰 News
    </a>

</div>

</div>

</body>
</html>
