<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>News Dashboard</title>

<style>

body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:#F4F6F8;
}

header{
    background:#0B2540;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    margin:0;
}

.back-link{
    display:inline-block;
    margin-top:10px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.back-link:hover{
    text-decoration:underline;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:25px;
}

.filter-bar{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.news-card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.news-title{
    font-size:22px;
    font-weight:bold;
    color:#005195;
}

.news-info{
    margin-top:5px;
    color:gray;
}

.news-link{
    display:inline-block;
    margin-top:10px;
    text-decoration:none;
    color:white;
    background:#005195;
    padding:8px 12px;
    border-radius:6px;
}

.news-link:hover{
    background:#0B2540;
}

select{
    padding:8px;
}

</style>

</head>

<body>

<header>

    <h1>News Dashboard</h1>

   <adex.htm
        ← Back to Cockpit
    </a>

</header>

<div class="container">

    <div class="filter-bar">

        <label><strong>Vehicle Type:</strong></label>

        <select id="vehicleFilter">
            <option value="Automotive">Automotive</option>
            <option value="CV">CV</option>
            <option value="All">All</option>
        </select>

    </div>

    <div id="newsContainer">

        <div class="news-card">

            <div class="news-title">
                Dashboard ready
            </div>

            <div class="news-info">
                Upload Dashboard_data_news.csv into the data folder
            </div>

        </div>

    </div>

</div>

</body>

</html>
