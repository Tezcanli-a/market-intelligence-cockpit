
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Production Dashboard</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:#F4F6F8;
    color:#1f2933;
}

header{
    background:#0B2540;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    margin:0;
    font-size:36px;
}

.back-link{
    display:inline-block;
    margin-top:10px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.back-link:hover{
    text-decoration:underline;
}

.container{
    max-width:1500px;
    margin:auto;
    padding:25px;
}

.filter-bar{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:25px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:15px;
}

.filter-group label{
    display:block;
    font-weight:bold;
    margin-bottom:6px;
    color:#0B2540;
    font-size:14px;
}

select,
input{
    width:100%;
    padding:9px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}

.kpi-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:20px;
    margin-bottom:25px;
}

.kpi-card{
    background:white;
    padding:22px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.kpi-title{
    font-size:14px;
    color:#667085;
    font-weight:bold;
    margin-bottom:8px;
}

.kpi-value{
    font-size:28px;
    font-weight:800;
    color:#005195;
}

.table-card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    overflow-x:auto;
}
    
.chart-card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    margin-bottom:25px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}

th{
    background:#0B2540;
    color:white;
    padding:10px;
    text-align:left;
    white-space:nowrap;
}

td{
    padding:9px;
    border-bottom:1px solid #e5e7eb;
    white-space:nowrap;
}

tr:hover{
    background:#F4F6F8;
}

.empty{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    color:#667085;
}

@media(max-width:1100px){
    .filter-bar{
        grid-template-columns:1fr 1fr;
    }

    .kpi-grid{
        grid-template-columns:1fr 1fr;
    }
}

@media(max-width:700px){
    .filter-bar{
        grid-template-columns:1fr;
    }

    .kpi-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<header>
    <h1>Production Dashboard</h1>
    <a href="index.html" class="back-link">← Back to Cockpit</a>
</header>

<div class="container">

    <div class="filter-bar">

        <div class="filter-group">
            <label for="regionFilter">Region</label>
            <select id="regionFilter">
                <option value="All">All Regions</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="marketFilter">Market</label>
            <select id="marketFilter">
                <option value="All">All Markets</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="countryFilter">Country/Territory</label>
            <select id="countryFilter">
                <option value="All">All Countries</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="salesGroupFilter">Sales Group</label>
            <select id="salesGroupFilter">
                <option value="All">All Sales Groups</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="brandFilter">Production Brand</label>
            <select id="brandFilter">
                <option value="All">All Brands</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="manufacturerFilter">Manufacturer</label>
            <select id="manufacturerFilter">
                <option value="All">All Manufacturers</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="yearFilter">Focus Year</label>
            <select id="yearFilter">
                <option value="CY 2025" selected>2025</option>
                <option value="CY 2026">2026</option>
                <option value="CY 2027">2027</option>
                <option value="CY 2028">2028</option>
                <option value="CY 2029">2029</option>
                <option value="CY 2030">2030</option>
                <option value="CY 2031">2031</option>
                <option value="CY 2032">2032</option>
                <option value="CY 2033">2033</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="searchInput">Search</label>
            <input id="searchInput" type="text" placeholder="Search plant, brand, nameplate...">
        </div>

    </div>

    <div class="kpi-grid">

        <div class="kpi-card">
            <div class="kpi-title">Production Volume</div>
            <div class="kpi-value" id="kpiVolume">-</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">Records</div>
            <div class="kpi-value" id="kpiRecords">-</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">Active Nameplates</div>
            <div class="kpi-value" id="kpiNameplates">-</div>
        </div>

        <div class="kpi-card">
            <div class="kpi-title">Top Manufacturer</div>
            <div class="kpi-value" id="kpiTopManufacturer">-</div>
        </div>

    </div>

    <div class="chart-card">
    <h2>Production Trend</h2>
    <canvas id="productionTrendChart" height="120"></canvas>
</div>

    <div class="table-card">
        <h2>Production Detail</h2>
        <div id="tableContainer">
            <div class="empty">Loading production data...</div>
        </div>
    </div>

</div>

<script>
let allProduction = [];

fetch("Dashboard_data_LV production.csv")
    .then(response => {
        if(!response.ok){
            throw new Error("Production CSV file not found");
        }
        return response.text();
    })
    .then(text => {
        allProduction = parseCSV(text);
        populateFilters();
        renderDashboard();
    })
    .catch(error => {
        document.getElementById("tableContainer").innerHTML =
            '<div class="empty">Could not load Dashboard_data_LV production.csv. Please check the filename and location.</div>';
        console.error(error);
    });

const filterIds = [
    "regionFilter",
    "marketFilter",
    "countryFilter",
    "salesGroupFilter",
    "brandFilter",
    "manufacturerFilter",
    "yearFilter",
    "searchInput"
];

filterIds.forEach(id => {
    document.getElementById(id).addEventListener("change", renderDashboard);
    document.getElementById(id).addEventListener("input", renderDashboard);
});

function detectDelimiter(firstLine){
    if(firstLine.includes(";")) return ";";
    if(firstLine.includes("\t")) return "\t";
    return ",";
}

function parseCSV(text){
    const lines = text.trim().split(/\r?\n/);
    const delimiter = detectDelimiter(lines[0]);
    const headers = splitLine(lines[0], delimiter).map(h => cleanCell(h));

    return lines.slice(1).map(line => {
        const values = splitLine(line, delimiter);
        const row = {};

        headers.forEach((header, index) => {
            row[header] = values[index] ? cleanCell(values[index]) : "";
        });

        return row;
    }).filter(row => row["VP: Region"] || row["VP: Production Brand"] || row["VP: Manufacturer"]);
}

function splitLine(line, delimiter){
    const result = [];
    let current = "";
    let insideQuotes = false;

    for(let i = 0; i < line.length; i++){
        const char = line[i];

        if(char === '"'){
            insideQuotes = !insideQuotes;
        } else if(char === delimiter && !insideQuotes){
            result.push(current);
            current = "";
        } else {
            current += char;
        }
    }

    result.push(current);
    return result;
}

function cleanCell(value){
    return value
        .replace(/^"|"$/g, "")
        .replace(/""/g, '"')
        .trim();
}

function toNumber(value){
    if(!value) return 0;

    return Number(
        value
            .toString()
            .replace(/\./g, "")
            .replace(/,/g, "")
            .replace(/\s/g, "")
    ) || 0;
}

function formatNumber(value){
    if(value >= 1000000){
        return (value / 1000000).toFixed(1) + "M";
    }

    if(value >= 1000){
        return (value / 1000).toFixed(0) + "k";
    }

    return value.toLocaleString();
}

function populateSelect(id, fieldName){
    const select = document.getElementById(id);
    const values = [...new Set(allProduction.map(row => row[fieldName]).filter(Boolean))].sort();

    values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
    });
}

function populateFilters(){
    populateSelect("regionFilter", "VP: Region");
    populateSelect("marketFilter", "VP: Market");
    populateSelect("countryFilter", "VP: Country/Territory");
    populateSelect("salesGroupFilter", "VP: Sales Group");
    populateSelect("brandFilter", "VP: Production Brand");
    populateSelect("manufacturerFilter", "VP: Manufacturer");
}

function getFilteredData(){
    const region = document.getElementById("regionFilter").value;
    const market = document.getElementById("marketFilter").value;
    const country = document.getElementById("countryFilter").value;
    const salesGroup = document.getElementById("salesGroupFilter").value;
    const brand = document.getElementById("brandFilter").value;
    const manufacturer = document.getElementById("manufacturerFilter").value;
    const search = document.getElementById("searchInput").value.toLowerCase();

    return allProduction.filter(row => {
        const regionMatch = region === "All" || row["VP: Region"] === region;
        const marketMatch = market === "All" || row["VP: Market"] === market;
        const countryMatch = country === "All" || row["VP: Country/Territory"] === country;
        const salesGroupMatch = salesGroup === "All" || row["VP: Sales Group"] === salesGroup;
        const brandMatch = brand === "All" || row["VP: Production Brand"] === brand;
        const manufacturerMatch = manufacturer === "All" || row["VP: Manufacturer"] === manufacturer;

        const searchText = [
            row["VP: Production Plant"],
            row["VP: Production Brand"],
            row["VP: Manufacturer"],
            row["VP: Production Nameplate"],
            row["VP: Vehicle"],
            row["VP: Country/Territory"],
            row["VP: Sales Group"]
        ].join(" ").toLowerCase();

        const searchMatch = searchText.includes(search);

        return regionMatch &&
               marketMatch &&
               countryMatch &&
               salesGroupMatch &&
               brandMatch &&
               manufacturerMatch &&
               searchMatch;
    });
}

function calculateTopManufacturer(data, yearField){
    const totals = {};

    data.forEach(row => {
        const manufacturer = row["VP: Manufacturer"] || "Unknown";
        const volume = toNumber(row[yearField]);

        if(!totals[manufacturer]){
            totals[manufacturer] = 0;
        }

        totals[manufacturer] += volume;
    });

    let topName = "-";
    let topValue = 0;

    Object.keys(totals).forEach(name => {
        if(totals[name] > topValue){
            topValue = totals[name];
            topName = name;
        }
    });

    return topName;
}

function renderDashboard(){
    const yearField = document.getElementById("yearFilter").value;
    const data = getFilteredData();

    const totalVolume = data.reduce((sum, row) => {
        return sum + toNumber(row[yearField]);
    }, 0);

    const nameplates = new Set(
        data.map(row => row["VP: Production Nameplate"]).filter(Boolean)
    );

    document.getElementById("kpiVolume").textContent = formatNumber(totalVolume);
    document.getElementById("kpiRecords").textContent = data.length.toLocaleString();
    document.getElementById("kpiNameplates").textContent = nameplates.size.toLocaleString();
    document.getElementById("kpiTopManufacturer").textContent = calculateTopManufacturer(data, yearField);

    renderTable(data, yearField);
}

function renderTable(data, yearField){
    const container = document.getElementById("tableContainer");

    if(data.length === 0){
        container.innerHTML = '<div class="empty">No production records found for the selected filters.</div>';
        return;
    }

    const sorted = [...data].sort((a, b) => toNumber(b[yearField]) - toNumber(a[yearField]));
    const topRows = sorted.slice(0, 200);

    let html = `
        <table>
            <thead>
                <tr>
                    <th>Region</th>
                    <th>Country/Territory</th>
                    <th>Sales Group</th>
                    <th>Manufacturer</th>
                    <th>Production Brand</th>
                    <th>Nameplate</th>
                    <th>Plant</th>
                    <th>${yearField}</th>
                </tr>
            </thead>
            <tbody>
    `;

    topRows.forEach(row => {
        html += `
            <tr>
                <td>${row["VP: Region"] || ""}</td>
                <td>${row["VP: Country/Territory"] || ""}</td>
                <td>${row["VP: Sales Group"] || ""}</td>
                <td>${row["VP: Manufacturer"] || ""}</td>
                <td>${row["VP: Production Brand"] || ""}</td>
                <td>${row["VP: Production Nameplate"] || ""}</td>
                <td>${row["VP: Production Plant"] || ""}</td>
                <td>${formatNumber(toNumber(row[yearField]))}</td>
            </tr>
        `;
    });

    html += `
            </tbody>
        </table>
    `;

    container.innerHTML = html;
}
</script>

</body>
</html>
